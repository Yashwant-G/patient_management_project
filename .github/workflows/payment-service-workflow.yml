name: payment-service-CI
on:
  push:
    branches:
      - develop
    paths:
      - 'payment-service/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: payment-service

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Give Execute permission
        run: chmod +x mvnw

      - name: Run tests & builds jar
        run: ./mvnw clean package

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build
        run: docker build -t yashwant317/patient-management-service:payment-latest .

      - name: Docker push to hub
        run: docker push yashwant317/patient-management-service:payment-latest