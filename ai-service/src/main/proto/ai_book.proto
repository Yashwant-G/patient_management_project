syntax="proto3";

option java_multiple_files=true;
option java_package="ai";

service AiService{
  rpc ParseAppointment(ParseAppointmentRequest) returns (ParseAppointmentResponse);
}

message ParseAppointmentRequest{
  string text=1;
}

message ParseAppointmentResponse{
  string patient_id=1;
  string start_time=2;
  string end_time=3;
  string reason=4;
  string patient_name=5;
  string doctor_name=6;
  string appointment_date=7;
}